<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de Textos</title>
    <style>
            mark { background-color: rgb(222, 60, 60);

            }
    </style>
</head>
<body>
    <h1>Principais formatações</h1> 
    <p>Irei colocar esse termo em negrito, <strong>esse termo</strong></p>
    <p>Irei colocar esse termo em intalico, <em>esse termo</em></p>
    <hr>
    <h2>Marcador de texto</h2> 
    <p>Posso marcar <mark>essas palavras</mark></p>
    <p>essa tbm ira ficar com a mesma cor, <mark>vermelho</mark></p> 
    <p><ins>Essa frase estara sublinhada</ins></p> 
    <p> posso fazer isso x <sup>20</sup>+5</p>
    <p>E tambem H <sub>2</sub>O</p>

</body>
</html>
