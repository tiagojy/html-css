<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: yellow;
        }
        h1:hover{
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Personalisando Links</h1> 
    <ul>
        <li> <a href="https://www.cursoemvideo.com/" target="_blank" >Site Curso em Video</a></li>
        <li><a href="https://www.youtube.com/results?search_query=curso+em+video" target="_blank">Canal do Youtuber</a></li>
        <li><a href="https://ge.globo.com/" target="_blank">GE</a></li>
    </ul>
</body>
</html>
